name: Build and Push
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Maximize disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/boost /usr/local/.ghcup /usr/local/graalvm \
            /usr/local/lib/node_modules /opt/hostedtoolcache/CodeQL \
            /usr/share/swift /usr/local/share/chromium /usr/share/miniconda
          sudo docker image prune -af
          sudo apt-get clean
          df -h /
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/thebassil/biosignal-docker:latest
          platforms: linux/amd64
